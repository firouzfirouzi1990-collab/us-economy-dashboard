name: Weekly Data Update

on:
  schedule:
    # هر دوشنبه ساعت ۱۳:۳۰ UTC (پس از انتشار NFP روز جمعه)
    - cron: '30 13 * * 1'
  workflow_dispatch: # اجرای دستی

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📊 Fetch economic data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          # نوشتن API Keyها از secrets به config.py
          python -c "
          import os
          content = open('config.py','r',encoding='utf-8').read()
          fred = os.environ.get('FRED_API_KEY','')
          bls = os.environ.get('BLS_API_KEY','')
          content = content.replace('FRED_API_KEY = \"\"', f'FRED_API_KEY = \"{fred}\"')
          content = content.replace('BLS_API_KEY = \"\"', f'BLS_API_KEY = \"{bls}\"')
          open('config.py','w',encoding='utf-8').write(content)
          "
          python fetcher.py

      - name: 📤 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json cache.json
          git diff --staged --quiet || (git commit -m "📊 weekly data update $(date -u +'%Y-%m-%d')" && git push)
